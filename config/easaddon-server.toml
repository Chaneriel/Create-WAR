#Range in blocks for storm detection and alerts
# Default: 512
# Range: 256 ~ 2048
radarDetectionRange = 512
#Range that matches PMWeather's radar display range
# Default: 1024
# Range: 256 ~ 4096
radarDisplayRange = 1024
#How cyclones are named: AUTOMATIC, MANUAL, or DISABLED
#Allowed Values: AUTOMATIC, MANUAL, DISABLED
cycloneNamingMode = "AUTOMATIC"
#Enable automatic outlook generation per Minecraft day (default: false)
enableRiskAutomation = false
#Controls how manual (WARNGEN) and automatic (SevereWatch) warnings interact.
#  BOTH_ENABLED: both run independently (default)
#  MANUAL_DISABLED: players can't issue warnings; only auto-watches run
#  AUTO_DISABLED: auto-watches don't run; only manual issuance works
#  AUTO_FALLBACK_WHEN_NO_TOWN_OPS_ONLINE: auto-watches run only when no town mayor/operator is online
#Allowed Values: BOTH_ENABLED, MANUAL_DISABLED, AUTO_DISABLED, AUTO_FALLBACK_WHEN_NO_TOWN_OPS_ONLINE
warningIssuanceMode = "BOTH_ENABLED"
#When true, the Weather Channel on a TV only shows warnings whose issuing EAS block matches the TV's bound EAS block
#(or are within range of it for auto-detected warnings). When false (default), the Weather Channel shows ALL warnings on the server.
weatherChannelLocalCoverageOnly = false
#Master switch: allow players to right-click EAS blocks to open the WarnGen GUI
warngenEnabled = true
#Allow drill-mode warnings (visible only to the issuer, no broadcast)
warngenAllowDrillMode = true
#Require WARNGEN polygons to contain at least one active PMWeather storm
warngenStormAnchoringRequired = true
# Default: 3
# Range: 3 ~ 32
warngenMinVertices = 3
# Default: 12
# Range: 3 ~ 32
warngenMaxVertices = 12
#Max polygon area in chunk² (1 chunk = 256 blocks²). Default 8192 chunks² = 2,097,152 blocks² (65536×32).
# Default: 65536
# Range: 16 ~ 65536
warngenMaxAreaChunks = 65536
# Default: 8192
# Range: 256 ~ 32768
warngenMaxIssueRangeBlocks = 8192
#Max squared distance (blocks²) between issuer and EAS block
# Default: 64
# Range: 4 ~ 4096
warngenMaxBlockInteractRangeSqr = 64
# Default: 360
# Range: 1 ~ 1440
warngenMaxDurationMinutes = 360
# Default: 60
# Range: 0 ~ 3600
warngenPerPlayerCooldownSec = 60
# Default: 3
# Range: 1 ~ 32
warngenMaxActivePerPlayer = 3
# Default: 4096
# Range: 0 ~ 32768
warngenAlertToneRangeBlocks = 4096
warngenEnforceConvex = true
warngenAuditFileEnabled = true
warngenPersistAcrossRestart = true
#Enable automatic Tornado Watch issuance once per Minecraft day when a Day1 SLGT+ SPC outlook covers a town.
autoTornadoWatchEnabled = true
#How often (in ticks) the auto-watch evaluator runs. Lower = more responsive, higher = lighter load.
# Default: 100
# Range: 20 ~ 1200
watchEvaluatorTickInterval = 100
#If true, auto-issued watches play the EAS alert beeps. Manual watches always play beeps.
autoWatchPlayAlertTone = false
#Allow players to manually issue Tornado or Severe Thunderstorm Watches from the SPC block GUI.
manualTornadoWatchEnabled = true

