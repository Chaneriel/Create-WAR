# Cloud Probe tuning â€” edit values, then run /cloudprobe reload in-game.
# This builds ONE towering cumulonimbus to judge the look. Distances in blocks.

# --- placement ---
baseY=165
placeDistance=380

# --- overall size (height is large on purpose â€” storms tower) ---
radius=135
height=800

# --- body shape ---
# coverageThreshold: global density bias â€” higher = sparser/wispier
# fillPower: BELOW 1 inflates density into solid bodies. Lower = fuller.
coverageThreshold=0.05
fillPower=0.28
detailErosion=0.45
lean=42

# --- anvil (the flat spreading top of a cumulonimbus) ---
anvilStart=0.63
anvilRadiusMul=2.2

# --- noise scales ---
formScale=340
billowScale=122
detailScale=41
formOctaves=3
billowOctaves=5
detailOctaves=3

# --- mesher (voxelSize smaller = finer + slower) ---
voxelSize=9.0
iso=0.5
padding=75

# --- lighting (baked per-vertex; re-bakes on every /regen) ---
sunAzimuthDeg=130
sunElevationDeg=42
sunAbsorption=0.0065
lightSteps=7
lightStepSize=24
ambient=0.30
sunR=1.00
sunG=0.95
sunB=0.86
skyR=0.55
skyG=0.66
skyB=0.86
exposure=1.15

# --- alpha / soft edges ---
bodyAlpha=0.94
edgeAlpha=0.30
alphaDepth=26
