#Volume of EAS alert sounds (0.0 = muted, 1.0 = full volume)
# Default: 1.0
# Range: 0.0 ~ 1.0
alertVolume = 1.0
#Use in-game time instead of real world time in alerts
useIngameTime = false
#Disable debug messages in the log
disableDebugOutput = false
#Volume of Tom TTS voice (0.0 = muted, 1.0 = full volume)
# Default: 1.0
# Range: 0.0 ~ 1.0
tomVolume = 1.0
#URL of the Tom TTS server
ttsServerUrl = "http://198.251.78.68:8080"
#Replace the stock alert sound with the authentic NOAA Weather Radio 1050 Hz attention tone
useNwrAttentionTone = true
